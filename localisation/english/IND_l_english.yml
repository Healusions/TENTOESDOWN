 IND_the_indianapolis_resolves:0 "The Indianapolis Resolves"
 IND_the_indianapolis_resolves_desc:0 "Passed in special session in the winter of 1935, the Resolves declare nothing. They simply decline, article by article, to recognize any federal authority to which Indiana has not consented. The lawyers call it interposition. Washington calls it treason. For now, nobody is shooting."
 IND_crossroads_of_america:0 "The Crossroads of America"
 IND_crossroads_of_america_desc:0 "More rail crosses Indiana than almost any state its size. If the embargo is going to break us, it will break here first — so it must not break here."
 IND_gary_works:0 "Gary Works"
 IND_gary_works_desc:0 "The largest steel works on earth sits on our lakeshore and belongs to a corporation headquartered in New York. Its board has not chosen a side. The Statehouse intends to make the choice for them."
 IND_allison_engineering:0 "Allison Engineering"
 IND_allison_engineering_desc:0 "The shop at Speedway builds the finest liquid-cooled aircraft engines in America. The Army Air Corps contracts are, as of this winter, suspended. The engineers are not."
 IND_studebaker_retools:0 "Studebaker Retools"
 IND_studebaker_retools_desc:0 "South Bend has built wagons since 1852. Wagons became automobiles. Automobiles can become trucks, and trucks can become whatever the situation requires."
 IND_the_question_of_1937:0 "The Question of 1937"
 IND_the_question_of_1937_desc:0 "The constitution of Indiana bars a governor from succeeding himself, and the Governor's term ends in January. In the upstairs rooms of the Columbia Club, men are discussing what comes next — and whether an election is the instrument to decide it."
 IND_the_black_boxes:0 "The Black Boxes"
 IND_the_black_boxes_desc:0 "D.C. Stephenson has sat in Michigan City for ten years. His black boxes have sat somewhere else. Whoever opens them owns half the public men in this state — and knows it."
 IND_the_wire_still_lives:0 "The Wire Still Lives"
 IND_the_wire_still_lives_desc:0 "They broke Terre Haute with bayonets and martial law and told themselves that was the end of it. The wire is still live. It runs from the Wabash to the Calumet, and it is waiting."
 IND_an_american_crown:0 "An American Crown"
 IND_an_american_crown_desc:0 "Say it plainly, in the clubs and in the papers: the republic failed. What the interior of this continent requires is continuity beyond any one man's ambition. There is a family in Indianapolis whose name already sounds like government."