 IND_the_indianapolis_resolves:0 "The Indianapolis Resolves"
 IND_the_indianapolis_resolves_desc:0 "Attorney General Lutz built them from Madison's lumber: interposition, the Virginia Resolutions of 1798, the state as judge of the federal compact. South Carolina's nullifiers carried the doctrine once and lost; Wisconsin's abolitionists carried it once and lost. It has never before been tried by a state holding the money — the federal remittances sit in an Indianapolis escrow, audited and untouchable."
 IND_crossroads_of_america:0 "The Crossroads of America"
 IND_crossroads_of_america_desc:0 "The Pennsylvania crosses at Fort Wayne, the New York Central at Elkhart, the B&O along the bottom, and the Monon runs the Chicago trade through Indianapolis. Every trunk line between the seaboard and Chicago pays toll in Hoosier track. Washington's license war cuts both ways — if the roadbed holds up. It must hold up."
 IND_gary_works:0 "Gary Works"
 IND_gary_works_desc:0 "Judge Gary's mill is a quarter century old and still the largest on earth, and it answers to a board at 71 Broadway. Chairman Taylor has issued no statement on the Resolves. The last time Gary chose a side, in 1919, the Army settled the question — the Statehouse means to be the army this time."
 IND_allison_engineering:0 "Allison Engineering"
 IND_allison_engineering_desc:0 "Jim Allison built racing engines at Speedway until General Motors bought the works in '29. The V-1710 — twelve cylinders, liquid-cooled — is the best aero engine in America, and as of the embargo the Army Air Corps is forbidden to buy it. Detroit owns the plant. Someone in the Statehouse has noticed the plant cannot be moved."
 IND_studebaker_retools:0 "Studebaker Retools"
 IND_studebaker_retools_desc:0 "South Bend already survived the fire: receivership in March of '33, President Erskine dead by his own hand that July, Hoffman and Vance walking the works out of the courts by '35. A firm that has buried its own president will not flinch at a state contract — or at what the state wants built."
 IND_the_question_of_1937:0 "The Question of 1937"
 IND_the_question_of_1937_desc:0 "The constitution of 1851 allows a governor four years in any eight; Paul McNutt's four expire in January. Frank McHale is taking soundings for the Machine. The Columbia Club, which exists because it elected a president once, is taking meetings of its own. November's election is on the calendar. What it will be permitted to decide is not."
 IND_the_black_boxes:0 "The Black Boxes"
 IND_the_black_boxes_desc:0 "The boxes opened once. In '27, refused parole, Stephenson handed the Indianapolis Times enough paper to convict Mayor Duvall and indict Governor Jackson; the Times took a Pulitzer and the Old Man stayed in Michigan City. He has spent ten years insisting there are more boxes. The question is no longer whether. It is who reaches him first."
 IND_the_wire_still_lives:0 "The Wire Still Lives"
 IND_the_wire_still_lives_desc:0 "Debs polled nine hundred thousand from a cell in Atlanta; his house on North Eighth Street stands in an occupied city. The men the Guard hunts learned their trade in the Brotherhoods and the mine locals, and Powers Hapgood — Harvard '21, blacklisted out of the coalfields — is home in Indianapolis. The wire runs from the Wabash to the Calumet."
 IND_an_american_crown:0 "An American Crown"
 IND_an_american_crown_desc:0 "No American family matches the ledger: a signer of the Declaration, Old Tippecanoe, and a president this very club put in the White House. Russell Harrison, the President's son, is eighty-one and keeps a law office downtown; his own son practices in the same city. Upstairs at the Columbia Club they have begun discussing continuity. In general terms. For now."



 IND_the_machine:0 "The McNutt Machine"
 IND_the_machine_desc:0 "One hundred sixty-nine boards, bureaus, and commissions went into the Reorganization Act of 1933; eight departments came out, each answering to Paul V. McNutt. Richard Lieber, who invented the state parks, resigned within the year. The government of Indiana now fits inside one man's appointment book."
 IND_two_percent_club:0 "The Two Percent Club"
 IND_two_percent_club_desc:0 "Two percent of every state paycheck, collected for the Hoosier Democratic Club by Frank McHale's office — assessed on highway crews and asylum nurses alike, receipted, ledgered, and spent wherever loyalty runs thin. The liquor licenses clear through the same desk. No one is compelled, and no one has ever missed a payment."
 IND_martial_law_terre_haute:0 "Martial Law in Terre Haute"
 IND_martial_law_terre_haute_desc:0 "The trouble at Columbian Enameling spread until twenty-six thousand were out, and the Guard has held Vigo County since July of '35 — curfew, padlocks, permits to assemble. Terre Haute buried Debs ten years ago and the occupation will not let it forget: every patrol on Wabash Avenue recruits for the thing it is hunting."
 IND_federal_embargo:0 "The Federal Embargo"
 IND_federal_embargo_desc:0 "No blockade, no proclamation — paperwork. Interchange licenses suspended for review, correspondent accounts frozen pending examination, every barge at Evansville found deficient in some particular. Washington's official position is that nothing has happened in Indiana. Nothing, accordingly, may cross the line."
 IND_consortium_credit:0 "Consortium Credit"
 IND_consortium_credit_desc:0 "Article 10 of the constitution forbids the state to borrow — the canal collapse of 1841 wrote that clause in stone. So this is not, formally, borrowing. It arrives through a Chicago holding company as advances against nothing in particular, whenever the Treasurer needs it, and the Treasurer has stopped putting his questions in writing."
 IND_union_men:0 "Union Men"
 IND_union_men_desc:0 "The Brotherhoods run the trains and the trains cross the state line; the paychecks clear through Chicago either way. The Methodist pulpits pray for Mr. Roosevelt by name. The Legion's national headquarters flies the national colors a short walk from the Statehouse — and its commander of 1928 now governs a state it has not decided how to address. No one has been disloyal. The national commandery declines, so far, to define the term."



 IND_the_terre_haute_question:0 "The Terre Haute Question"
 IND_the_terre_haute_question_desc:0 "Martial law has held Vigo County since the strike broke in July of 1935. Under the curfew the movement is rebuilding: the garrison counts [?IND_underground|.0] known cells, and does not pretend that is the whole census."
 IND_th_hold_the_line:0 "Hold the Line"
 IND_th_hold_the_line_desc:0 "Maintain the occupation as written: curfew at ten, halls padlocked, permits for any gathering, patrols on Wabash Avenue. It keeps the city quiet and costs almost nothing — except that the occupation is the one argument the movement never has to make for itself."
 IND_th_ease_the_curfews:0 "Ease the Curfews"
 IND_th_ease_the_curfews_desc:0 "Reopen the halls under observation and let the meetings happen where plainclothes men can sit in the back. What organizes in the open votes, files grievances, holds elections — and drains the cellar while it does. Hulman & Company will telephone the Statehouse within the hour."
 IND_th_sweep_the_halls:0 "Sweep the Union Halls"
 IND_th_sweep_the_halls_desc:0 "The Guard knows half the addresses; informants will sell the rest. Presses, mimeographs, membership books, all in one night. Done cleanly it sets the movement back years. Done badly it hands Terre Haute the one thing it has never lacked: a funeral worth marching behind."



 IND_intro.1.t:0 "The State of the State"
 IND_intro.1.d:0 "Indianapolis, the first of January, 1936. The special session that passed the Resolves has declined to adjourn — the Assembly sits on into the winter like a body that expects to be needed on short notice. On the Circle the flags are unchanged, and the monument at its center still honors the army this state sent to save the Union. WFBM wants a New Year's address from the Governor. The Governor is still choosing his words. How Indiana came to stand here is worth telling in order — or the work can simply begin."
 IND_intro.1.a:0 "Tell it from '33."
 IND_intro.1.b:0 "I know how we got here."
 IND_intro.2.t:0 "1933: The Engine Assembled"
 IND_intro.2.d:0 "Paul Vories McNutt took the Statehouse in the winter of the bank holiday: Franklin born, dean of the Indiana law school at thirty-four, national commander of the American Legion at thirty-seven, silver-haired at forty and entirely aware of the effect. The Assembly gave him the Reorganization Act within the month — one hundred sixty-nine agencies into eight departments — and Frank McHale organized the Two Percent Club to tax the payroll for the Party. Mr. Roosevelt's program that same spring was twice as ambitious; the Nine Old Men took it apart statute by statute, until recovery was a memory with a docket number. By 1935, of the two governments an Indianan lived under, exactly one could still execute a decision."
 IND_intro.2.a:0 "Then Terre Haute."
 IND_intro.3.t:0 "1935: Terre Haute"
 IND_intro.3.d:0 "It began at Columbian Enameling and Stamping, over a contract the company would not sign, and by the twenty-third of July twenty-six thousand were out — what Seattle did in '19 and San Francisco did in '34, done now in a rail town on the Wabash. McNutt sent the Guard, declared martial law across Vigo County, and when the strike broke, kept the occupation. In November the War Department issued its order: the Indiana Guard would enter federal service, and the occupation would end under Regular officers. The Statehouse did not refuse. It requested clarification — statutory basis, appropriations, command channels — and it has been requesting clarification ever since. The Guard stands at its posts. The reply remains in draft."
 IND_intro.3.a:0 "And then the lawyers."
 IND_intro.4.t:0 "The Indianapolis Resolves"
 IND_intro.4.d:0 "The special session convened in December and armed Attorney General Lutz's paperwork with the force of law. The Resolves secede from nothing; they interpose — Madison's device of 1798, carried once by South Carolina's nullifiers and once by Wisconsin's abolitionists, beaten both times. It has never before been tried by a state that holds the money: federal remittances now accumulate in an Indianapolis escrow the Treasury may audit and cannot touch. Washington answered in kind. Interchange licenses suspended, correspondent accounts frozen, barges held at Evansville. And into the squeeze came other money — by way of a holding company in Chicago, promptly, quietly, and without a single question about collateral."
 IND_intro.4.a:0 "Bring it up to the present."
 IND_intro.5.t:0 "January 1936: The Situation"
 IND_intro.5.d:0 "So stands Indiana on New Year's Day: Terre Haute garrisoned by its own Guard, the railheads under review, the treasury solvent on Chicago money no one has explained to the Assembly. The Brotherhoods still run their trains through; the Legion's national headquarters still flies the national colors a short walk from the Statehouse; neither has yet been asked its opinion in a form requiring an answer. Two dates own the calendar now. In November, the state votes. In January of 1937, by the constitution of 1851, Paul McNutt's four years end — and that constitution, alone among the charters of American government, still runs here at full force."
 IND_intro.5.a:0 "To work."
